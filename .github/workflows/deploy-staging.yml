name: Deploy Jesse staging

on:
  workflow_run:
    workflows: ["Jesse tests and build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit SHA that already passed tests
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  staging:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: staging
    env:
      TARGET_SHA: ${{ inputs.commit_sha || github.event.workflow_run.head_sha }}
      JESSE_ELEVENLABS_API_KEY: ${{ secrets.JESSE_ELEVENLABS_API_KEY }}
      JESSE_ELEVENLABS_STAGING_AGENT_ID: ${{ secrets.JESSE_ELEVENLABS_STAGING_AGENT_ID }}
      JESSE_TWILIO_ACCOUNT_SID: ${{ secrets.JESSE_TWILIO_ACCOUNT_SID }}
      JESSE_TWILIO_AUTH_TOKEN: ${{ secrets.JESSE_TWILIO_AUTH_TOKEN }}
      JESSE_TWILIO_STAGING_NUMBER: ${{ secrets.JESSE_TWILIO_STAGING_NUMBER }}
      JESSE_N8N_BASE_URL: ${{ secrets.JESSE_N8N_BASE_URL }}
      JESSE_N8N_API_KEY: ${{ secrets.JESSE_N8N_API_KEY }}
      JESSE_N8N_STAGING_WORKFLOW_ID: ${{ secrets.JESSE_N8N_STAGING_WORKFLOW_ID }}
      JESSE_GOOGLE_CREDENTIALS_JSON: ${{ secrets.JESSE_GOOGLE_CREDENTIALS_JSON }}
      JESSE_GOOGLE_STAGING_CALENDAR_ID: ${{ secrets.JESSE_GOOGLE_STAGING_CALENDAR_ID }}
      JESSE_GOOGLE_STAGING_SHEET_ID: ${{ secrets.JESSE_GOOGLE_STAGING_SHEET_ID }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GOOGLE_SHEETS_SPREADSHEET_ID: ${{ vars.GOOGLE_SHEETS_SPREADSHEET_ID }}
      GOOGLE_SHEETS_WORKSHEET_NAME: ${{ vars.GOOGLE_SHEETS_WORKSHEET_NAME }}
      GOOGLE_AUTH_MODE: ${{ vars.GOOGLE_AUTH_MODE }}
      GOOGLE_SHEETS_MODE: ${{ vars.GOOGLE_SHEETS_MODE }}
      GOOGLE_SHEETS_SANDBOX_ENABLED: ${{ vars.GOOGLE_SHEETS_SANDBOX_ENABLED }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.TARGET_SHA }}
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Validate staging deployment plan
        run: python -m agents.jessie.cli deploy-staging --commit-sha "$TARGET_SHA"
      - name: Record summary
        run: |
          echo '## Jesse staging deployment' >> "$GITHUB_STEP_SUMMARY"
          echo "Validated commit: \\`$TARGET_SHA\\`" >> "$GITHUB_STEP_SUMMARY"
          echo 'External actions: disabled in v1 adapter' >> "$GITHUB_STEP_SUMMARY"
