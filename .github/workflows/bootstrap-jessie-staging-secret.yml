name: Bootstrap Jesse staging API credential

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    environment: staging
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
      SECRET_NAME: jesse-staging-admin-token
    steps:
      - uses: actions/checkout@v7

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Create or rotate the staging-only credential
        shell: bash
        run: |
          set -euo pipefail
          if ! gcloud secrets describe "$SECRET_NAME" --project "$GCP_PROJECT_ID" >/dev/null 2>&1; then
            gcloud secrets create "$SECRET_NAME" \
              --project "$GCP_PROJECT_ID" \
              --replication-policy automatic \
              --quiet
          fi
          python - <<'PY' | gcloud secrets versions add "$SECRET_NAME" \
            --project "$GCP_PROJECT_ID" \
            --data-file=- \
            --quiet >/dev/null
          import secrets
          print(secrets.token_urlsafe(48), end="")
          PY
          gcloud secrets add-iam-policy-binding "$SECRET_NAME" \
            --project "$GCP_PROJECT_ID" \
            --member "serviceAccount:$GCP_SERVICE_ACCOUNT" \
            --role roles/secretmanager.secretAccessor \
            --quiet >/dev/null
          echo "Staging credential is configured; its value was not printed."
