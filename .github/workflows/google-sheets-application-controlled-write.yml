name: Google Sheets application controlled write

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  write-one-synthetic-lead:
    runs-on: ubuntu-latest
    environment: staging
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
      SERVICE_NAME: success-brand-jesse-staging
      SERVICE_URL: https://success-brand-jesse-staging-708353059015.us-central1.run.app
      REGION: us-central1
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        id: google-auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          token_format: id_token
          id_token_audience: ${{ env.SERVICE_URL }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Submit exactly one synthetic lead through the application
        shell: bash
        run: |
          set -euo pipefail
          api_token="$(gcloud secrets versions access latest \
            --secret jesse-staging-admin-token --project "$GCP_PROJECT_ID")"
          identity_token="${{ steps.google-auth.outputs.id_token }}"
          request_id="app-controlled-${GITHUB_RUN_ID}"
          intake_file="$(mktemp)"
          write_file="$(mktemp)"
          trap 'rm -f "$intake_file" "$write_file"' EXIT

          intake_status="$(curl --silent --show-error --output "$intake_file" --write-out '%{http_code}' \
            --request POST "$SERVICE_URL/intakes" \
            --header "Authorization: Bearer $identity_token" \
            --header "X-API-Key: $api_token" \
            --header "X-Request-ID: $request_id" \
            --header 'Content-Type: application/json' \
            --data '{"caller_name":"Sandbox Test","phone_number":"5550000199","email":"test@example.com","reason_for_call":"appointment inquiry","urgency":"normal","consent_to_store":true}')"
          test "$intake_status" = 201
          intake_id="$(python - "$intake_file" <<'PY'
          import json, sys
          print(json.load(open(sys.argv[1], encoding="utf-8"))["id"])
          PY
          )"

          write_status="$(curl --silent --show-error --output "$write_file" --write-out '%{http_code}' \
            --request POST "$SERVICE_URL/sandbox/sheets/intakes/$intake_id" \
            --header "Authorization: Bearer $identity_token" \
            --header "X-API-Key: $api_token" \
            --header "X-Request-ID: $request_id")"
          test "$write_status" = 200
          python - "$write_file" <<'PY'
          import json, sys
          payload = json.load(open(sys.argv[1], encoding="utf-8"))
          assert payload.get("integration") == "google_sheets"
          assert payload.get("result", {}).get("status") == "written"
          PY
          echo "Application write succeeded with synthetic data; sensitive values were not logged."
