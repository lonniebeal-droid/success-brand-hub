name: Google Calendar controlled sandbox appointment

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  create-one-fake-appointment:
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/calendar.events

      - name: Create exactly one synthetic appointment
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          CALENDAR_ID: ${{ vars.JESSE_GOOGLE_STAGING_CALENDAR_ID }}
          REQUEST_ID: sandbox-calendar-controlled-v1
        run: |
          set -euo pipefail
          test -n "$ACCESS_TOKEN"
          test -n "$CALENDAR_ID"

          encoded_calendar=$(python -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["CALENDAR_ID"], safe=""))')
          query=$(python -c 'import os, urllib.parse; print(urllib.parse.quote("request_id=" + os.environ["REQUEST_ID"], safe=""))')
          existing=$(curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://www.googleapis.com/calendar/v3/calendars/${encoded_calendar}/events?privateExtendedProperty=${query}&maxResults=1")
          count=$(python -c 'import json,sys; print(len(json.load(sys.stdin).get("items", [])))' <<<"$existing")

          if [ "$count" -gt 0 ]; then
            {
              echo 'appointment_write_status: skipped'
              echo 'reason: duplicate_request_id'
              echo 'appointments_written: 0'
              echo 'real_attendees_added: false'
              echo 'sandbox_feature_enabled: false'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          start=$(date -u -d '+1 day' '+%Y-%m-%dT15:00:00Z')
          end=$(date -u -d '+1 day' '+%Y-%m-%dT15:30:00Z')
          payload=$(python - "$start" "$end" <<'PY'
          import json, os, sys
          print(json.dumps({
              "summary": "SuccessBrand Sandbox Appointment Test",
              "description": "Success Brand synthetic staging appointment.",
              "start": {"dateTime": sys.argv[1]},
              "end": {"dateTime": sys.argv[2]},
              "extendedProperties": {"private": {"request_id": os.environ["REQUEST_ID"], "sandbox": "true"}},
          }))
          PY
          )
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H 'Content-Type: application/json' \
            --data "$payload" \
            "https://www.googleapis.com/calendar/v3/calendars/${encoded_calendar}/events" >/dev/null

          {
            echo 'appointment_write_status: success'
            echo 'appointments_written: 1'
            echo 'real_attendees_added: false'
            echo 'phone_or_email_written: false'
            echo 'sandbox_feature_enabled: false'
            echo "workflow_run_id: $GITHUB_RUN_ID"
          } >> "$GITHUB_STEP_SUMMARY"
